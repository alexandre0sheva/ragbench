run:
  name: all_systems_demo
  output_dir: results

dataset:
  documents_path: data/demo/docs
  questions_path: data/demo/questions.jsonl
  qrels_path: data/demo/qrels.jsonl

systems:
  - type: bm25
    name: bm25_default
    chunker:
      type: token
      chunk_size: 450
      chunk_overlap: 70
    retrieval:
      top_k: 5
    models:
      generator: gpt-5.4-nano

  - type: vector
    name: vector_default
    chunker:
      type: token
      chunk_size: 500
      chunk_overlap: 80
    retrieval:
      vector_store: chroma
      top_k: 5
    models:
      embedding: text-embedding-3-small
      generator: gpt-5.4-nano

  - type: hybrid
    name: hybrid_default
    chunker:
      type: token
      chunk_size: 500
      chunk_overlap: 80
    retrieval:
      vector_store: chroma
      bm25_top_k: 20
      vector_top_k: 20
      final_top_k: 5
      rrf_k: 60
      multi_query: true
      max_query_variants: 4
    models:
      embedding: text-embedding-3-small
      generator: gpt-5.4-nano

  - type: rerank
    name: rerank_default
    chunker:
      type: token
      chunk_size: 500
      chunk_overlap: 80
    retrieval:
      vector_store: chroma
      candidate_top_k: 30
      final_top_k: 5
      reranker: local_relevance
      multi_query: true
      max_query_variants: 4
    models:
      embedding: text-embedding-3-small
      generator: gpt-5.4-nano

  - type: parent_doc
    name: parent_doc_default
    chunker:
      child_chunk_size: 250
      child_chunk_overlap: 50
      parent_chunk_size: 1000
      parent_chunk_overlap: 150
    retrieval:
      vector_store: chroma
      top_k_children: 8
      top_k_parents: 4
    models:
      embedding: text-embedding-3-small
      generator: gpt-5.4-nano

  - type: llm_heavy
    name: llm_heavy_default
    chunker:
      type: token
      chunk_size: 500
      chunk_overlap: 80
    retrieval:
      vector_store: chroma
      top_k: 5
      per_query_top_k: 10
      reranker: local_relevance
    models:
      embedding: text-embedding-3-small
      generator: gpt-5.4-mini
    llm_features:
      enable_llm_ingestion: false
      enable_query_rewrite: true
      enable_llm_rerank: false

evaluation:
  k_values: [1, 3, 5, 10]
  judge_enabled: true
  judge_model: gpt-5.4-nano
  max_questions: null
  max_workers: 4
