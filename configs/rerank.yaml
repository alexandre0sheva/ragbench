run:
  name: rerank_demo
  output_dir: results

dataset:
  documents_path: data/demo/docs
  questions_path: data/demo/questions.jsonl
  qrels_path: data/demo/qrels.jsonl

systems:
  - type: rerank
    name: rerank_default
    chunker:
      type: token
      chunk_size: 500
      chunk_overlap: 80
    retrieval:
      vector_store: chroma
      candidate_top_k: 30
      final_top_k: 5
      reranker: local_relevance
      multi_query: true
      max_query_variants: 4
    models:
      embedding: text-embedding-3-small
      generator: gpt-5.4-nano

evaluation:
  k_values: [1, 3, 5, 10]
  judge_enabled: true
  judge_model: gpt-5.4-nano
  max_questions: null
  max_workers: 4
