run:
  name: bm25_demo
  output_dir: results

dataset:
  documents_path: data/demo/docs
  questions_path: data/demo/questions.jsonl
  qrels_path: data/demo/qrels.jsonl

systems:
  - type: bm25
    name: bm25_default
    chunker:
      type: token
      chunk_size: 450
      chunk_overlap: 70
    retrieval:
      top_k: 5
    models:
      generator: gpt-5.4-nano

evaluation:
  k_values: [1, 3, 5, 10]
  judge_enabled: true
  judge_model: gpt-5.4-nano
  max_questions: null
  max_workers: 4
